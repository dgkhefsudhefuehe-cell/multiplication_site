{% extends 'trainer/base.html' %}

{% block title %}Сброс пароля - Админ-панель{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-warning">
                    <h3 class="mb-0">🔐 Сброс пароля</h3>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-info">
                        <strong>Пользователь:</strong> {{ user.username }}<br>
                        <strong>Email:</strong> {{ user.email }}<br>
                        <strong>Дата запроса:</strong> {{ reset_request.created_at|date:"d.m.Y H:i" }}
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Новый пароль</label>
                            <input type="password" name="new_password" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Подтверждение пароля</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Сбросить пароль</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
