{% extends 'trainer/base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body text-center p-4">
                    <h3 class="mb-3">🔐 Восстановление пароля</h3>
                    <p class="text-muted mb-4">Введите ваш email. Администратор получит запрос в админ-панели.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="Ваш email" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">📨 Отправить запрос</button>
                    </form>
                    <hr class="my-4">
                    <div class="text-center">
                        <a href="{% url 'login' %}">← Вернуться ко входу</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
