{% extends 'trainer/base.html' %}

{% block title %}Новый пароль{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Новый пароль</h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="password" name="new_password1" class="form-control" placeholder="Новый пароль" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" name="new_password2" class="form-control" placeholder="Подтвердите пароль" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Сменить пароль</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
