{% extends 'trainer/base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Восстановление пароля</h3>
                    <p class="text-muted text-center mb-4">Введите email, указанный при регистрации</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="email" name="email" class="form-control" placeholder="Email" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Отправить</button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <a href="{% url 'login' %}">Вернуться ко входу</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
